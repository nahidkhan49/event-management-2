{% load static %}

<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Event</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">


<div class="bg-white w-full max-w-md p-6 rounded-lg shadow-md">
    <a href="{% url 'dashboard' %}" class=" text-blue-500 text-lg hover:text-blue-600 transition">Dashboard</a>
    <h2 class="text-2xl font-bold text-center mb-6">{{heading}}</h2>

    <div class="">
        {% if messages %}
            {% for message in messages  %}
            <div class="px-2 py-1 {% if message.tags == 'success' %}bg-green-500 text-xl text-gray-100{% endif %} ">{{message}} </div>
        
            {% endfor %}
        {% endif %}
        
    </div>
    

    <form method="POST" class="space-y-4">
        {% csrf_token %}

        {{event_form}}
        {{category_form}}
        {{up_form}}
        {{participant}}
        {{up_participant}}

        
        <button type="submit"
            class="w-full bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700 transition">
            Submit
        </button>
    </form>
   
</div>


</body>
</html>
