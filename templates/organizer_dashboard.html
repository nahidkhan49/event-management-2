{% extends "layouts/base.html" %}
{% block title %}Organizer Dashboard{% endblock %}
{% block content %}

<h1 class="text-3xl font-bold mb-8">Organizer Dashboard</h1>

<div class="grid grid-cols-4 gap-6 mb-8">

  <div class="bg-white p-6 rounded shadow text-center">
    <h3 class="text-lg">Total Events</h3>
    <p class="text-3xl font-bold">{{ events|length }}</p>
  </div>

</div>

<h2 class="text-2xl font-semibold mb-4">My Events</h2>

<div class="bg-white p-6 rounded shadow">
  {% for event in events %}
    <div class="border-b py-3 flex justify-between">
      <span>{{ event.name }}</span>
      <span>{{ event.date }}</span>
    </div>
  {% empty %}
    <p>No events created yet.</p>
  {% endfor %}
</div>

{% endblock %}
